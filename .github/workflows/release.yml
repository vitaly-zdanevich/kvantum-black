name: release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ "${tag}" =~ ^v[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?$ ]]; then
            exit 0
          fi

          echo "::error::Expected a version tag like v0.1.0, got ${tag}"
          exit 1

      - name: Build release archive
        id: archive
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          archive="kvantum-black-${version}.tar.gz"

          git archive --format=tar --prefix="kvantum-black-${version}/" "${tag}" \
            | gzip -9n > "${archive}"

          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          archive="${{ steps.archive.outputs.archive }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists"
            gh release upload "${tag}" "${archive}" --clobber
            exit 0
          fi

          gh release create "${tag}" \
            "${archive}" \
            --title "${tag}" \
            --generate-notes
